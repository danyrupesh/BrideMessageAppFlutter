name: MessageApp
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.2+1

environment:
  sdk: ^3.11.1

dependencies:
  archive: ^4.0.9
  dio: ^5.9.2
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  flutter_colorpicker: ^1.1.0
  flutter_widget_from_html: ^0.17.1
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0
  path: ^1.9.1
  path_provider: ^2.1.5
  pdf: ^3.12.0
  printing: ^5.14.3
  file_selector: ^1.1.0
  share_plus: ^12.0.1
  open_filex: ^4.5.0
  shared_preferences: ^2.5.4
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.6
  sqlite3: ^3.2.0
  uuid: ^4.5.3
  app_links: ^7.0.0
  protocol_handler: ^0.2.0
  window_manager: ^0.5.1
  windows_single_instance: ^1.1.0
  unorm_dart: ^0.3.0
  package_info_plus: ^9.0.0
  in_app_update: ^4.2.3
  url_launcher: ^6.0.0
  super_editor: ^0.3.0-dev.50


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/NotoSerifTamil-Regular.ttf
    - assets/fonts/NotoSerifTamil-Bold.ttf

  fonts:
    - family: NotoSerifTamil
      fonts:
        - asset: assets/fonts/NotoSerifTamil-Regular.ttf
        - asset: assets/fonts/NotoSerifTamil-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon_1024.png
  min_sdk_android: 21
  adaptive_icon_foreground: assets/icons/app_icon_1024.png
  adaptive_icon_background: "#FFFFFF"
  web:
    generate: true
    image_path: assets/icons/app_icon_1024.png
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"
  windows:
    generate: true
    image_path: assets/icons/app_icon_1024.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/icons/app_icon_1024.png
